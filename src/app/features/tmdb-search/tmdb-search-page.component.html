<ng-container *transloco="let t">
  <div class="search-page p-4">
    <h1 class="search-page__title">{{ t('tmdb.searchTitle') }}</h1>

    <div class="search-page__input-wrap">
      <span class="p-input-icon-left">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          [placeholder]="t('tmdb.searchPlaceholder')"
          [value]="searchQuery()"
          (input)="onQueryChange($any($event.target).value)"
          class="search-page__input"
        />
      </span>
    </div>

    @if (searchService.loading()) {
      <app-loading-skeleton variant="list" [count]="5" />
    } @else if (searchService.error()) {
      <app-error-message
        [message]="t(searchService.error()!)"
        [showRetry]="true"
        (retry)="searchService.search(searchQuery())"
      />
    } @else if (searchService.results().length === 0 && searchQuery().length > 0) {
      <div class="search-page__empty">
        <i class="pi pi-search"></i>
        <p>{{ t('tmdb.noResults') }}</p>
      </div>
    } @else {
      <div class="search-page__results">
        @for (result of searchService.results(); track result.tmdbId) {
          <app-tmdb-result-card
            [result]="result"
            [importing]="isImporting(result.tmdbId)"
            [wishlisting]="isWishlisting(result.tmdbId)"
            (importClick)="onImport($event)"
            (wishlistClick)="onWishlist($event)"
          />
        }
      </div>
    }
  </div>
</ng-container>
