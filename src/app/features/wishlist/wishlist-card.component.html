<ng-container *transloco="let t">
  <div class="wishlist-card" [class.wishlist-card--acquired]="item.isAcquired">
    @if (item.posterPath) {
      <img
        class="wishlist-card__poster"
        [src]="item.posterPath | tmdbImage: 'w185'"
        [alt]="item.title"
        loading="lazy"
      />
    } @else {
      <div class="wishlist-card__poster-placeholder">
        <i class="pi pi-bookmark"></i>
      </div>
    }

    <div class="wishlist-card__body">
      <div class="wishlist-card__header">
        <h3 class="wishlist-card__title">{{ item.title }}</h3>
        @if (item.isAcquired) {
          <p-tag [value]="t('wishlist.acquired')" severity="success" />
        }
      </div>

      @if (item.releaseDate) {
        <p class="wishlist-card__meta">{{ item.releaseDate | slice: 0:4 }}</p>
      }

      @if (item.acquiredAt) {
        <p class="wishlist-card__acquired-date">
          {{ t('wishlist.acquiredOn') }}: {{ item.acquiredAt | date: 'mediumDate' }}
        </p>
      }

      @if (item.notes) {
        <p class="wishlist-card__notes">{{ item.notes }}</p>
      }

      <div class="wishlist-card__actions">
        <p-button
          [label]="item.isAcquired ? t('wishlist.markNotAcquired') : t('wishlist.markAcquired')"
          [icon]="item.isAcquired ? 'pi pi-times' : 'pi pi-check'"
          size="small"
          [severity]="item.isAcquired ? 'secondary' : 'success'"
          (onClick)="onMarkAcquired()"
        />
        <p-button
          [label]="t('common.remove')"
          icon="pi pi-trash"
          size="small"
          severity="danger"
          [outlined]="true"
          (onClick)="onRemove()"
        />
      </div>
    </div>
  </div>
</ng-container>
